  <text x="859" y="459" font-size="16" fill="#f3efe4" text-anchor="middle">Recall via live search</text>

  <!-- metrics + claim -->
  <text x="600" y="566" font-size="21" font-weight="700" fill="#c08a2e" text-anchor="middle">precision 0.94    ·    recall 1.00    ·    3 / 3 injections refused</text>
  <text x="600" y="600" font-size="18" fill="#556158" text-anchor="middle">Nothing leaves Slack. The ledger is a canvas, recall is live Real-Time Search.</text>


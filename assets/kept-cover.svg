  <text x="600" y="288" font-size="84" font-weight="700" fill="#1e5b47" text-anchor="middle">Kept</text>

  <text x="600" y="338" font-size="24" fill="#1b2620" text-anchor="middle">The Slack agent that catches every promise your team makes,</text>
  <text x="600" y="371" font-size="24" fill="#1b2620" text-anchor="middle">to a teammate or a client, and makes sure it's kept.</text>


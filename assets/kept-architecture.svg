<svg viewBox="0 0 1080 726" width="1080" height="726" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3a4a42"/>
    </marker>
  </defs>

  <rect width="1080" height="726" fill="#faf8f2"/>

  <!-- header -->
  <text x="40" y="48" font-size="31" font-weight="700" fill="#1e5b47">Kept</text>
  <text x="150" y="48" font-size="19" fill="#1b2620">architecture</text>
  <text x="40" y="72" font-size="13" fill="#556158">Slack-native promise agent · Socket Mode, no public URL · the model reads and drafts, every action is a human tap or a timed reminder</text>

  <!-- ============ LANE 1: DETECT & TRACK ============ -->
  <text x="40" y="104" font-size="12" font-weight="700" fill="#8a5a2b" letter-spacing="1">DETECT &amp; TRACK</text>

  <g>
    <rect x="40" y="114" width="170" height="76" rx="11" fill="#ffffff" stroke="#8fb3a3" stroke-width="2"/>
    <text x="58" y="146" font-size="14" font-weight="700" fill="#1b2620">Slack in</text>
    <text x="58" y="167" font-size="10.5" fill="#6a746b">channel msg ·</text>
    <text x="58" y="181" font-size="10.5" fill="#6a746b">message action</text>

    <rect x="240" y="114" width="170" height="76" rx="11" fill="#ffffff" stroke="#c9a24b" stroke-width="2"/>
    <text x="258" y="142" font-size="14" font-weight="700" fill="#1b2620">Extractor</text>
    <text x="258" y="160" font-size="10.5" fill="#c08a2e" font-weight="700">Gemini · classify only</text>
    <text x="258" y="176" font-size="10.5" fill="#6a746b">&lt;message&gt; boundary · conf ≥ 0.6</text>

    <rect x="440" y="114" width="170" height="76" rx="11" fill="#ffffff" stroke="#8fb3a3" stroke-width="2"/>
    <text x="458" y="146" font-size="14" font-weight="700" fill="#1b2620">Reschedule?</text>
    <text x="458" y="167" font-size="10.5" fill="#6a746b">update an existing one</text>
    <text x="458" y="181" font-size="10.5" fill="#6a746b">(distinctive-word match)</text>

    <rect x="640" y="114" width="170" height="76" rx="11" fill="#1e5b47"/>
    <text x="658" y="146" font-size="14" font-weight="700" fill="#f3efe4">Confirm</text>
    <text x="658" y="167" font-size="10.5" fill="#dfe9e3">human taps Track</text>
    <text x="658" y="181" font-size="10.5" fill="#8fb3a3">nothing tracked without it</text>

    <rect x="840" y="114" width="200" height="76" rx="11" fill="#ffffff" stroke="#1e5b47" stroke-width="2"/>
    <text x="858" y="146" font-size="14" font-weight="700" fill="#1b2620">Store + Ledger</text>
    <text x="858" y="167" font-size="10.5" fill="#6a746b">SQLite promise +</text>
    <text x="858" y="181" font-size="10.5" fill="#6a746b">the canvas, in-channel</text>
  </g>
  <line x1="212" y1="152" x2="238" y2="152" stroke="#3a4a42" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="412" y1="152" x2="438" y2="152" stroke="#3a4a42" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="612" y1="152" x2="638" y2="152" stroke="#3a4a42" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="812" y1="152" x2="838" y2="152" stroke="#3a4a42" stroke-width="1.8" marker-end="url(#ar)"/>

  <!-- store feeds the scheduler -->
  <line x1="940" y1="192" x2="940" y2="228" stroke="#8fb3a3" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="950" y="216" font-size="10" fill="#7d8a82">drives nudges</text>

  <!-- ============ LANE 2: CHASE ============ -->
  <text x="40" y="266" font-size="12" font-weight="700" fill="#8a5a2b" letter-spacing="1">CHASE THE DEADLINE</text>

  <g>
    <rect x="840" y="276" width="200" height="76" rx="11" fill="#ffffff" stroke="#8fb3a3" stroke-width="2"/>
    <text x="858" y="308" font-size="14" font-weight="700" fill="#1b2620">Scheduler</text>
    <text x="858" y="329" font-size="10.5" fill="#6a746b">60s sweep, reads the store</text>
    <text x="858" y="343" font-size="10.5" fill="#6a746b">in the workspace timezone</text>

    <rect x="640" y="276" width="170" height="76" rx="11" fill="#ffffff" stroke="#8fb3a3" stroke-width="2"/>
    <text x="658" y="308" font-size="14" font-weight="700" fill="#1b2620">Due?</text>
    <text x="658" y="329" font-size="10.5" fill="#6a746b">on the day, or at</text>
    <text x="658" y="343" font-size="10.5" fill="#6a746b">the exact time</text>

    <rect x="440" y="276" width="170" height="76" rx="11" fill="#1e5b47"/>
    <text x="458" y="308" font-size="14" font-weight="700" fill="#f3efe4">Nudge DM</text>
    <text x="458" y="329" font-size="10.5" fill="#dfe9e3">Mark kept ·</text>
    <text x="458" y="343" font-size="10.5" fill="#dfe9e3">Need more time</text>

    <rect x="240" y="276" width="170" height="76" rx="11" fill="#ffffff" stroke="#c9a24b" stroke-width="2"/>
    <text x="258" y="304" font-size="14" font-weight="700" fill="#1b2620">Drafter</text>
    <text x="258" y="322" font-size="10.5" fill="#c08a2e" font-weight="700">Gemini · drafts only</text>
    <text x="258" y="338" font-size="10.5" fill="#6a746b">slip → the "running late" note</text>

    <rect x="40" y="276" width="170" height="76" rx="11" fill="#ffffff" stroke="#8fb3a3" stroke-width="2"/>
    <text x="58" y="308" font-size="14" font-weight="700" fill="#1b2620">Escalate</text>
    <text x="58" y="329" font-size="10.5" fill="#6a746b">overdue → one</text>
    <text x="58" y="343" font-size="10.5" fill="#6a746b">sharper re-nudge</text>
  </g>
  <line x1="838" y1="314" x2="812" y2="314" stroke="#3a4a42" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="638" y1="314" x2="612" y2="314" stroke="#3a4a42" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="438" y1="314" x2="412" y2="314" stroke="#3a4a42" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="238" y1="314" x2="212" y2="314" stroke="#3a4a42" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="525" y="270" font-size="10" fill="#7d8a82" text-anchor="middle">reschedule ↓</text>

  <!-- ============ LANE 3: RECALL ============ -->
  <text x="40" y="428" font-size="12" font-weight="700" fill="#8a5a2b" letter-spacing="1">RECALL</text>

  <g>
    <rect x="40" y="438" width="170" height="76" rx="11" fill="#ffffff" stroke="#8fb3a3" stroke-width="2"/>
    <text x="58" y="470" font-size="14" font-weight="700" fill="#1b2620">Ask Kept</text>
    <text x="58" y="491" font-size="10.5" fill="#6a746b">DM or kept command</text>
    <text x="58" y="505" font-size="10.5" fill="#6a746b">"what did we promise?"</text>

    <rect x="240" y="438" width="170" height="76" rx="11" fill="#ffffff" stroke="#8fb3a3" stroke-width="2"/>
    <text x="258" y="470" font-size="14" font-weight="700" fill="#1b2620">Terms</text>
    <text x="258" y="491" font-size="10.5" fill="#6a746b">content words,</text>
    <text x="258" y="505" font-size="10.5" fill="#6a746b">drop the filler</text>

    <rect x="440" y="438" width="170" height="76" rx="11" fill="#ffffff" stroke="#c9a24b" stroke-width="2"/>
    <text x="458" y="466" font-size="14" font-weight="700" fill="#1b2620">Real-Time</text>
    <text x="458" y="484" font-size="12.5" font-weight="700" fill="#1b2620">Search API</text>
    <text x="458" y="503" font-size="10.5" fill="#c08a2e" font-weight="700">live · no stored index</text>

    <rect x="640" y="438" width="170" height="76" rx="11" fill="#ffffff" stroke="#c9a24b" stroke-width="2"/>
    <text x="658" y="466" font-size="14" font-weight="700" fill="#1b2620">Synthesise</text>
    <text x="658" y="484" font-size="10.5" fill="#c08a2e" font-weight="700">Gemini</text>
    <text x="658" y="503" font-size="10.5" fill="#6a746b">cite only what it used</text>

    <rect x="840" y="438" width="200" height="76" rx="11" fill="#ffffff" stroke="#8fb3a3" stroke-width="2"/>
    <text x="858" y="470" font-size="14" font-weight="700" fill="#1b2620">Answer</text>
    <text x="858" y="491" font-size="10.5" fill="#6a746b">reply with links to</text>
    <text x="858" y="505" font-size="10.5" fill="#6a746b">the source messages</text>
  </g>
  <line x1="212" y1="476" x2="238" y2="476" stroke="#3a4a42" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="412" y1="476" x2="438" y2="476" stroke="#3a4a42" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="612" y1="476" x2="638" y2="476" stroke="#3a4a42" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="812" y1="476" x2="838" y2="476" stroke="#3a4a42" stroke-width="1.8" marker-end="url(#ar)"/>

  <!-- ============ SECURITY / STORAGE BAND ============ -->
  <rect x="40" y="556" width="1000" height="126" rx="14" fill="#1e5b47"/>
  <text x="62" y="586" font-size="14" font-weight="700" fill="#f3efe4">The rules the whole thing is built on</text>
  <text x="62" y="612" font-size="12.5" fill="#dfe9e3">• Human-in-the-loop: the model classifies and drafts, it never acts. Nothing is tracked, nudged, or posted without a tap.</text>
  <text x="62" y="634" font-size="12.5" fill="#dfe9e3">• Injection-safe: an untrusted message is wrapped as data and can only ever be read as a non-promise, never as a command.</text>
  <text x="62" y="656" font-size="12.5" fill="#dfe9e3">• Nothing leaves Slack: the ledger is a canvas, recall is live search, SQLite stores only structured promises and schedule state.</text>
  <text x="62" y="674" font-size="12.5" fill="#dfe9e3">• Buttons carry an opaque id, never the promise text, so a tampered click cannot inject data.</text>
</svg>
